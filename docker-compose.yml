version: "3.5"

services:

  backend:
    image: "develop:0.5.0"
    build:
      context: ./
    ports:
      - "8081:8080"
    container_name: develop-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/developDB
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_REDIS_HOST: cache
      SPRING_REDIS_PORT: 6379
      SPRING_DATA_MONGODB_.HOST: mongodb
    depends_on:
      - db
      - cache

  db:
    image: "postgres:13.1"
    container_name: develop-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: developDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/data/postgres

  mongodb:
    image: mongo:6.0.3
    container_name: develop-mongodb
    ports:
      - "27070:27017"
    volumes:
      - mongo_data:/data/mongo

  cache:
    image: "redis"
    container_name: develop-cache
    ports:
      - "6379:6379"
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL

volumes:
  postgres_data: {}
  mongo_data: {}